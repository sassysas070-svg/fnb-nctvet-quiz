<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NCTVET Cluster 1 Exam | Student Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef3ec;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
        }
        .exam-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .exam-header {
            background: #1e3a2f;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .exam-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .student-bar {
            background: #fef5e0;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid #d4e2d4;
            font-weight: 500;
        }
        .student-name {
            background: #2b7a4b;
            color: white;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .quiz-body {
            padding: 2rem;
            background: #fffdf9;
        }
        .question-item {
            background: white;
            border: 1px solid #e2ecd9;
            border-radius: 24px;
            padding: 1.3rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }
        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1e2f28;
            margin-bottom: 1rem;
            line-height: 1.45;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-left: 0.5rem;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.5rem 0.8rem;
            background: #fafaf7;
            border-radius: 50px;
            border: 1px solid #e3e9df;
            cursor: pointer;
            transition: 0.1s;
        }
        .option:hover {
            background: #f0f7ea;
            border-color: #9bc18b;
        }
        input[type="radio"] {
            accent-color: #2b7a4b;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .option label {
            font-size: 0.94rem;
            font-weight: 500;
            color: #2b3b2c;
            cursor: pointer;
            width: 100%;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }
        button {
            background: #2b5d46;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #1f4535;
            transform: scale(0.97);
        }
        .submit-btn {
            background: #c26e2c;
        }
        .score-panel {
            background: #e6f0e8;
            border-radius: 30px;
            padding: 1rem 1.5rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .teacher-dashboard {
            display: none;
            background: #f2efe2;
            border-top: 2px solid #d0ddc5;
            padding: 1.5rem 2rem;
            margin-top: 20px;
        }
        .teacher-dashboard.visible {
            display: block;
        }
        .login-area {
            background: #f2efe2;
            padding: 1.5rem;
            text-align: center;
            border-radius: 28px;
            margin-top: 20px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #bbb;
            font-size: 0.9rem;
            width: 220px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            background: #fffff5;
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #cfdec8;
            vertical-align: top;
        }
        th {
            background: #2d6a4f;
            color: white;
        }
        .clear-history {
            background: #9e6b5e;
            margin-top: 15px;
            font-size: 0.8rem;
            padding: 8px 20px;
        }
        footer {
            background: #f2efe2;
            text-align: center;
            font-size: 0.7rem;
            padding: 15px;
            color: #4e6b5c;
        }
        .teacher-toggle {
            text-align: right;
            padding: 8px 20px;
            background: #f5efe2;
            font-size: 0.75rem;
        }
        .teacher-toggle a {
            color: #2b7a4b;
            cursor: pointer;
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            .quiz-body { padding: 1rem; }
            .question-item { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div class="exam-header">
        <h1>🍽️ NCTVET Cluster 1 Examination</h1>
        <p>Food & Beverage • Grade 11 • St. Ann, Jamaica</p>
        <p style="font-size:0.85rem;">60 multiple choice questions | 1 mark each</p>
    </div>
    <div class="teacher-toggle">
        👩‍🏫 <a id="teacherToggleLink">Teacher Dashboard (Access Code)</a>
    </div>
    <div id="mainContent"></div>
    <div id="teacherPanel" class="teacher-dashboard"></div>
    <footer>NCTVET Cluster 1 • St. Ann, Jamaica • Your results are private to you. Teacher can view all attempts with secure access.</footer>
</div>

<script>
    // --------------------------------------------------------------
    // 60 MCQs – same robust questions as before
    // Student view: only sees own grade after submission.
    // Teacher view: requires access code "NCTVET2025" to see dashboard with ALL student results.
    // Results stored in localStorage, teacher can export CSV.
    // --------------------------------------------------------------
    const ACCESS_CODE = "NCTVET2025";
    
    const QUESTIONS = [
        { text: "What does 'sustainability' mean in a hospitality workplace?", options: ["Maximising current profits at any cost", "Meeting present needs without compromising future generations", "Using only disposable products", "Ignoring environmental regulations"], correct: 1 },
        { text: "A hotel kitchen throws away 25 kg of leftover food daily. Which combination best reduces this waste?", options: ["Increase portion sizes", "Implement batch cooking, track inventory, and compost scraps", "Send all leftovers directly to landfill", "Use only frozen prepared meals"], correct: 1 },
        { text: "Which of the following is NOT one of the 3Rs of environmental sustainability?", options: ["Reduce", "Reuse", "Recycle", "Repair"], correct: 3 },
        { text: "If a restaurant switches to LED lighting and energy-efficient refrigerators, this directly helps to:", options: ["Increase water usage", "Conserve energy and reduce greenhouse gas emissions", "Produce more food waste", "Eliminate the need for recycling"], correct: 1 },
        { text: "A chef notices a dripping tap in the prep area. According to environmental best practices, the FIRST step is:", options: ["Ignore it until the end of the shift", "Wrap a cloth around the leak", "Report it immediately to maintenance or supervisor", "Place a bucket underneath and forget"], correct: 2 },
        { text: "Which action is an example of 'Reuse' in a food service operation?", options: ["Shredding paper for recycling", "Refilling glass water bottles for guests", "Turning off lights when leaving", "Buying recycled napkins"], correct: 1 },
        { text: "What is the main purpose of a workplace environmental policy?", options: ["To increase paperwork", "To provide guidelines for managing environmental responsibilities", "To reduce employee breaks", "To promote single-use plastics"], correct: 1 },
        { text: "A hotel in Jamaica wants to reduce its carbon footprint. Which sustainable purchasing choice is most effective?", options: ["Import all ingredients from overseas", "Purchase energy-efficient equipment and source local produce", "Use individually wrapped plastic cutlery", "Increase air conditioning usage"], correct: 1 },
        { text: "The term 'FIFO' in food storage helps reduce waste. What does FIFO stand for?", options: ["First In, First Out", "Fast In, Fast Out", "Food In, Food Out", "Final In, Final Out"], correct: 0 },
        { text: "Why is water conservation critical in the hospitality industry?", options: ["It increases pollution", "It preserves water resources and lowers utility costs", "It makes food taste better", "It only benefits the garden"], correct: 1 },
        { text: "An employee sees that the walk-in cooler door seal is broken, causing cold air to escape. This directly leads to:", options: ["Better food quality", "Energy waste and potential temperature fluctuation", "Faster cooling", "Reduced humidity"], correct: 1 },
        { text: "Which of the following is an environmentally friendly purchasing practice?", options: ["Buying products with excessive plastic packaging", "Choosing cleaning chemicals that are non-toxic and biodegradable", "Ordering more than needed to get a discount", "Using disposable cutlery for all meals"], correct: 1 },
        { text: "What is the primary greenhouse gas emitted by hospitality operations that contributes to climate change?", options: ["Oxygen", "Carbon dioxide (CO₂)", "Nitrogen", "Hydrogen"], correct: 1 },
        { text: "A cafeteria starts composting fruit and vegetable scraps. This directly:", options: ["Increases landfill waste", "Reduces methane emissions and creates fertilizer", "Uses more water", "Increases energy consumption"], correct: 1 },
        { text: "Which of the following is an example of 'Reduce' in action?", options: ["Printing double-sided to use half the paper", "Washing and reusing glass jars", "Recycling aluminum cans", "Donating old uniforms"], correct: 0 },
        { text: "A restaurant trains staff to turn off all equipment when not in use. This practice primarily supports:", options: ["Water conservation only", "Energy conservation and cost reduction", "Food safety", "Increased waste"], correct: 1 },
        { text: "What is the temperature range known as the 'Danger Zone' where bacteria grow rapidly?", options: ["0°C to 10°C", "5°C to 60°C", "20°C to 40°C", "Below 0°C"], correct: 1 },
        { text: "A food handler uses the same cutting board for raw chicken and then for dicing tomatoes without washing. This is an example of:", options: ["Cleaning", "Cross-contamination", "Sanitizing", "Temperature abuse"], correct: 1 },
        { text: "What does HACCP stand for in food safety management?", options: ["Hazard Analysis Critical Control Point", "Health and Cooking Control Program", "Hygiene Assessment for Cooked Products", "High Acidity Critical Control Plan"], correct: 0 },
        { text: "A cook has a fever, vomiting, and diarrhea. According to food safety regulations, the manager should:", options: ["Let them wear gloves and continue", "Assign to non-food handling duties or send them home", "Give medication and have them work", "Only handle dry storage"], correct: 1 },
        { text: "What is the correct minimum time for proper handwashing with soap and warm water?", options: ["5 seconds", "10 seconds", "20 seconds", "1 minute"], correct: 2 },
        { text: "Raw chicken should be stored on the bottom shelf of the refrigerator to prevent:", options: ["Freezer burn", "Dripping juices onto ready-to-eat foods", "Energy loss", "Cross-contact with allergens only"], correct: 1 },
        { text: "Which of the following is a biological contaminant?", options: ["Broken glass", "Cleaning detergent residue", "Salmonella bacteria", "Metal shavings"], correct: 2 },
        { text: "The proper order for cleaning a food-contact surface is:", options: ["Sanitize, rinse, clean", "Clean, rinse, sanitize, air dry", "Rinse, sanitize, clean", "Clean, sanitize, rinse"], correct: 1 },
        { text: "A food delivery arrives with swollen canned goods. The receiver should:", options: ["Accept and store them", "Reject the swollen cans and notify supervisor (risk of botulism)", "Puncture cans to release pressure", "Refrigerate immediately"], correct: 1 },
        { text: "What is the minimum internal cooking temperature for ground beef patties?", options: ["60°C", "71°C (160°F)", "55°C", "80°C"], correct: 1 },
        { text: "Which practice helps prevent cross-contamination in a busy kitchen?", options: ["Using the same tongs for raw and cooked meat", "Washing hands between tasks and using separate colour-coded boards", "Touching ready-to-eat food with bare hands", "Storing chemicals above food"], correct: 1 },
        { text: "A server drops a fork on the floor, picks it up, and uses it to plate dessert. This introduces what type of hazard?", options: ["Biological", "Chemical", "Physical (foreign object/dirt)", "Allergen"], correct: 2 },
        { text: "Foods that require time/temperature control for safety (TCS) include:", options: ["Dry pasta", "Cooked rice and sliced melons", "Unopened canned soda", "Whole raw potatoes"], correct: 1 },
        { text: "What is the correct way to cool a large pot of hot soup safely?", options: ["Leave on counter overnight", "Place in shallow pans and refrigerate uncovered until cooled", "Put directly into freezer while hot", "Add cold water without stirring"], correct: 1 },
        { text: "Which symptom means a food handler MUST be excluded from the workplace?", options: ["Minor cut on finger", "Runny nose", "Vomiting and diarrhea", "Headache"], correct: 2 },
        { text: "The acronym FIFO in food storage helps ensure:", options: ["Older products are used before newer ones", "New products are used first", "All products are frozen", "Food is discarded weekly"], correct: 0 },
        { text: "What is the maximum time food can safely remain in the temperature danger zone during service?", options: ["2 hours", "4 hours", "6 hours", "8 hours"], correct: 1 },
        { text: "A cook wipes raw meat juices with a cloth and then uses the same cloth to wipe the counter. This is a risk for:", options: ["Chemical contamination", "Cross-contamination", "No risk", "Energy waste"], correct: 1 },
        { text: "Which of the following is a common food allergen that must be controlled to prevent cross-contact?", options: ["Sugar", "Gluten (wheat)", "Salt", "Corn starch"], correct: 1 },
        { text: "When receiving fresh fish, an acceptable quality indicator is:", options: ["Strong ammonia smell", "Bright, clear eyes and red gills", "Slimy sticky surface", "Brown discolored edges"], correct: 1 },
        { text: "What does 'potable water' mean?", options: ["Recycled grey water", "Water that is safe to drink", "Water used only for cleaning", "Salt water"], correct: 1 },
        { text: "A food handler with a small cut on their finger must:", options: ["Ignore it and work normally", "Cover with a waterproof bandage and wear a single-use glove", "Only handle dry ingredients", "Put on a regular bandage only"], correct: 1 },
        { text: "A small grease fire starts in a frying pan. What is the correct response?", options: ["Throw water on the flames", "Cover with a lid and turn off the heat", "Use a cloth towel to fan the fire", "Run to find a fire extinguisher first"], correct: 1 },
        { text: "What does PPE stand for?", options: ["Personal Protective Equipment", "Public Protection Enactment", "Professional Performance Evaluation", "Product Processing Equipment"], correct: 0 },
        { text: "A worker lifts a heavy box by bending at the waist with straight legs and feels back pain. This is related to which hazard?", options: ["Physical hazard", "Ergonomic hazard (poor lifting technique)", "Chemical hazard", "Biological hazard"], correct: 1 },
        { text: "What is the first step in conducting a workplace risk assessment?", options: ["Implement control measures", "Identify hazards", "Record findings", "Train employees"], correct: 1 },
        { text: "A staff member notices a frayed electrical cord near a dishwasher. The appropriate action is:", options: ["Cover it with tape", "Report the hazard immediately and do not use the equipment", "Ignore it if still working", "Pull the cord to test"], correct: 1 },
        { text: "During a fire emergency, after activating the nearest alarm, employees should:", options: ["Collect personal belongings", "Evacuate via the nearest safe exit to the assembly point", "Try to extinguish the fire without training", "Call family members"], correct: 1 },
        { text: "What does a 'Prohibition Sign' (red circle with a diagonal line) indicate?", options: ["Emergency exit", "An action that is not allowed", "Mandatory PPE", "Warning of a hazard"], correct: 1 },
        { text: "A front desk employee leaves confidential guest credit card information visible on a shared desk. This violates:", options: ["Food safety", "Workplace security and confidentiality policies", "Sustainability rules", "PPE requirements"], correct: 1 },
        { text: "Which of the following is a physical hazard in the workplace?", options: ["Cleaning chemicals", "Wet floor without a sign", "Salmonella bacteria", "Loud noise (excessive volume)"], correct: 1 },
        { text: "The main purpose of an accident report is to:", options: ["Assign blame to an employee", "Prevent future accidents and improve safety", "Increase paperwork", "Reduce insurance claims"], correct: 1 },
        { text: "Who is responsible for workplace health and safety according to NCTVET standards?", options: ["Only the employer", "Only employees", "Shared responsibility between employer and employees", "Only the government"], correct: 2 },
        { text: "What is the correct first aid for a minor cut while preparing food?", options: ["Ignore and continue working", "Wash the cut, apply a waterproof bandage, and wear a glove", "Rub salt into the cut", "Dip hand in sanitizer solution"], correct: 1 },
        { text: "What does 'good housekeeping' primarily reduce?", options: ["Staff morale", "Customer satisfaction", "Slips, trips, and falls hazards", "Energy bills"], correct: 2 },
        { text: "An employee sees a suspicious person loitering near the hotel's back office. Best security practice is:", options: ["Confront the person directly", "Notify security or supervisor immediately", "Ignore them", "Offer them a visitor badge"], correct: 1 },
        { text: "Which of the following is an example of a chemical hazard?", options: ["Hot surface", "Broken glass", "Cleaning bleach stored without a label", "Loud music"], correct: 2 },
        { text: "What is the acronym RACE commonly used for fire safety?", options: ["Run, Alert, Call, Exit", "Rescue, Alarm, Contain, Extinguish/Evacuate", "Remove, Ask, Call, Enter", "Ready, Aim, Call, Extinguish"], correct: 1 },
        { text: "A near-miss incident (e.g., a heavy pan almost falls on someone but does not) should be:", options: ["Ignored because no injury occurred", "Reported to help prevent future accidents", "Kept secret to avoid blame", "Only reported if damage occurs"], correct: 1 },
        { text: "What information is typically found on a Safety Data Sheet (SDS)?", options: ["Menu prices", "Chemical hazards and first aid measures", "Employee work schedules", "Guest preferences"], correct: 1 },
        { text: "Which action reduces the risk of ergonomic injury in a kitchen?", options: ["Lifting with back instead of legs", "Using anti-fatigue mats and proper knife techniques", "Standing on unstable stools", "Repeating the same motion for hours without breaks"], correct: 1 },
        { text: "A staff member notices an emergency exit blocked by boxes. The correct action is:", options: ["Leave it for the cleaner", "Clear the exit and report the violation to a supervisor", "Ignore because it's not their job", "Put a sign on the boxes"], correct: 1 },
        { text: "Which of the following is a security threat specific to hotels?", options: ["A broken toaster", "Unauthorized access to guest rooms or back-of-house areas", "A leaking pipe", "Power outage"], correct: 1 },
        { text: "An employee fails to report a spill on the floor, and a guest slips. This could be prevented by:", options: ["Better lighting", "Immediate reporting and cleaning of hazards", "Ignoring small spills", "Placing a mat after the accident"], correct: 1 }
    ];

    const TOTAL_QS = QUESTIONS.length;
    let allAttempts = [];  // stores { studentName, timestamp, score, details }
    let currentStudent = null;
    let selectedAnswers = new Array(TOTAL_QS).fill(null);
    let quizSubmitted = false;
    let teacherAuthenticated = false;

    const container = document.getElementById('mainContent');
    const teacherPanel = document.getElementById('teacherPanel');

    function loadHistory() {
        const stored = localStorage.getItem('nctvet_secure_attempts');
        if (stored) { try { allAttempts = JSON.parse(stored); } catch(e) { allAttempts = []; } }
        else { allAttempts = []; }
    }
    function saveHistory() { localStorage.setItem('nctvet_secure_attempts', JSON.stringify(allAttempts)); }

    function exportCSV() {
        if (allAttempts.length === 0) { alert("No attempts recorded."); return; }
        let rows = [["Student Name", "Date/Time", "Score (out of 60)", "Percentage", "Details (60 answers: ✓/✗)"]];
        for (let att of allAttempts) {
            let pattern = "";
            for (let i=0; i<att.details.length; i++) pattern += att.details[i].isCorrect ? "✓" : "✗";
            let percent = ((att.score/60)*100).toFixed(1);
            rows.push([`"${att.studentName.replace(/"/g, '""')}"`, `"${att.timestamp}"`, `${att.score}/60`, `${percent}%`, `"${pattern}"`]);
        }
        const csv = rows.map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "nctvet_all_student_results.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function renderTeacherDashboard() {
        if (!teacherAuthenticated) {
            teacherPanel.innerHTML = `<div class="login-area">
                <h3>🔐 Teacher Access Required</h3>
                <p>Enter the access code to view all student results and export grades.</p>
                <input type="password" id="teacherCode" placeholder="Access code" />
                <button id="verifyTeacherBtn" style="margin-left: 10px;">Unlock Dashboard</button>
            </div>`;
            const verifyBtn = document.getElementById('verifyTeacherBtn');
            if (verifyBtn) {
                verifyBtn.addEventListener('click', () => {
                    const code = document.getElementById('teacherCode').value;
                    if (code === ACCESS_CODE) {
                        teacherAuthenticated = true;
                        renderTeacherDashboard();
                    } else { alert("Invalid access code. Please contact your teacher."); }
                });
            }
            return;
        }
        // Render full teacher dashboard with all attempts
        if (allAttempts.length === 0) {
            teacherPanel.innerHTML = `<h3>📊 Teacher Dashboard</h3><p>No student attempts yet. Once students submit, results appear here.</p><button id="exportTeacherCsv" class="clear-history" style="background:#4a6b5c;">📎 Export CSV (All Grades)</button>`;
        } else {
            let tableHtml = `</table><thead><tr><th>Student</th><th>Date/Time</th><th>Score/60</th><th>%</th><th>Answer Pattern (60 answers)</th></tr></thead><tbody>`;
            for (let att of allAttempts) {
                let patternShort = "";
                for (let i=0; i<att.details.length; i++) patternShort += att.details[i].isCorrect ? "✓" : "✗";
                let percent = ((att.score/60)*100).toFixed(1);
                tableHtml += `<tr><td><strong>${escapeHtml(att.studentName)}</strong></td><td>${escapeHtml(att.timestamp)}</td><td>${att.score}/60</td><td>${percent}%</td><td style="font-family:monospace; font-size:0.7rem;">${patternShort}</td></tr>`;
            }
            tableHtml += `</tbody></table><button id="exportTeacherCsv" class="clear-history" style="background:#4a6b5c; margin-top:15px;">📎 Export CSV (All Grades)</button>
                         <button id="clearAllHistoryBtn" class="clear-history" style="background:#9e6b5e; margin-left:10px;">🧹 Clear All History</button>`;
            teacherPanel.innerHTML = `<h3>📊 Teacher Dashboard — All Student Results (Private)</h3>${tableHtml}<p style="font-size:0.7rem; margin-top:8px;">✓ = correct, ✗ = incorrect. Only you can see this dashboard.</p>`;
        }
        const exportBtn = document.getElementById('exportTeacherCsv');
        if (exportBtn) exportBtn.addEventListener('click', exportCSV);
        const clearBtn = document.getElementById('clearAllHistoryBtn');
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                if (confirm("⚠️ DELETE ALL student attempt history? This cannot be undone.")) {
                    allAttempts = [];
                    saveHistory();
                    renderTeacherDashboard();
                    if (currentStudent && quizSubmitted) {
                        // refresh student view if needed
                        renderStudentView();
                    }
                }
            });
        }
    }

    function renderStudentView() {
        if (!currentStudent) {
            container.innerHTML = `
                <div class="quiz-body" style="text-align:center;">
                    <div style="background:#fffaf0; border-radius:36px; padding:2rem;">
                        <h2>📋 NCTVET Cluster 1 Exam</h2>
                        <p>60 multiple-choice questions. After submission, you will see your score.<br>Your results are private.</p>
                        <input type="text" id="studentName" placeholder="Enter your full name" style="padding:12px 20px; width:70%; max-width:300px; border-radius:60px; border:2px solid #2b7a4b;" />
                        <br/><br/>
                        <button id="startExamBtn" style="background:#2b7a4b;">▶ Start Exam</button>
                    </div>
                </div>
            `;
            const startBtn = document.getElementById('startExamBtn');
            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    const name = document.getElementById('studentName').value.trim();
                    if (!name) { alert("Please enter your full name."); return; }
                    currentStudent = name;
                    selectedAnswers.fill(null);
                    quizSubmitted = false;
                    renderStudentView();
                });
            }
            return;
        }

        let questionsHtml = '';
        for (let i = 0; i < TOTAL_QS; i++) {
            const q = QUESTIONS[i];
            const selectedVal = selectedAnswers[i];
            questionsHtml += `
                <div class="question-item">
                    <div class="question-text">${i+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => {
                            const isChecked = (selectedVal === optIdx);
                            return `<div class="option">
                                <input type="radio" name="q${i}" value="${optIdx}" id="q${i}_opt${optIdx}" ${isChecked ? 'checked' : ''} ${quizSubmitted ? 'disabled' : ''}>
                                <label for="q${i}_opt${optIdx}">${String.fromCharCode(65+optIdx)}. ${opt}</label>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        const actionButtons = !quizSubmitted ? `
            <div class="action-buttons">
                <button id="clearAllBtn" class="reset-quiz">🗑️ Clear All Answers</button>
                <button id="submitExamBtn" class="submit-btn">✅ Submit Exam & See My Score</button>
            </div>
        ` : `
            <div class="action-buttons">
                <button id="retakeBtn">⟳ Take New Exam (Clear answers)</button>
            </div>
        `;

        const scoreDisplay = quizSubmitted ? `<div class="score-panel" id="scorePanel">🎓 ${escapeHtml(currentStudent)}, your final score: <span id="finalScoreSpan">--</span> / ${TOTAL_QS}</div>` : `<div class="score-panel">📌 Answer all 60 questions. Each correct = 1 mark. Your result will be shown only to you.</div>`;

        container.innerHTML = `
            <div class="student-bar">
                <span>👩‍🍳 Student: <span class="student-name">${escapeHtml(currentStudent)}</span></span>
                <button class="change-student" id="changeStudentBtn">⟳ Switch Student</button>
            </div>
            <div class="quiz-body">
                <form id="examForm">${questionsHtml}</form>
                ${actionButtons}
                ${scoreDisplay}
            </div>
        `;

        if (!quizSubmitted) {
            for (let i=0; i<TOTAL_QS; i++) {
                const radios = document.querySelectorAll(`input[name="q${i}"]`);
                radios.forEach(radio => radio.addEventListener('change', (e) => { if (!quizSubmitted) selectedAnswers[i] = parseInt(e.target.value); }));
            }
            const clearBtn = document.getElementById('clearAllBtn');
            if (clearBtn) clearBtn.addEventListener('click', () => { if (confirm('Clear all answers?')) { selectedAnswers.fill(null); renderStudentView(); } });
            const submitBtn = document.getElementById('submitExamBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const unanswered = [];
                    for (let i=0; i<TOTAL_QS; i++) if (selectedAnswers[i] === null) unanswered.push(i+1);
                    if (unanswered.length) { alert(`Unanswered questions: ${unanswered.join(', ')}. Please answer all.`); return; }
                    let correctCount = 0;
                    const details = [];
                    for (let i=0; i<TOTAL_QS; i++) {
                        const isCorrect = (selectedAnswers[i] === QUESTIONS[i].correct);
                        if (isCorrect) correctCount++;
                        details.push({ qIdx: i, isCorrect: isCorrect });
                    }
                    const attemptRecord = {
                        studentName: currentStudent,
                        timestamp: new Date().toLocaleString(),
                        score: correctCount,
                        total: TOTAL_QS,
                        details: details
                    };
                    allAttempts.unshift(attemptRecord);
                    saveHistory();
                    quizSubmitted = true;
                    renderStudentView();
                    if (teacherAuthenticated) renderTeacherDashboard();
                });
            }
        } else {
            let finalCorrect = 0;
            for (let i=0; i<TOTAL_QS; i++) if (selectedAnswers[i] !== null && selectedAnswers[i] === QUESTIONS[i].correct) finalCorrect++;
            const scoreSpan = document.getElementById('finalScoreSpan');
            if (scoreSpan) scoreSpan.innerText = finalCorrect;
            const retakeBtn = document.getElementById('retakeBtn');
            if (retakeBtn) retakeBtn.addEventListener('click', () => { if (confirm('Start a new exam?')) { selectedAnswers.fill(null); quizSubmitted = false; renderStudentView(); } });
        }

        const changeBtn = document.getElementById('changeStudentBtn');
        if (changeBtn) changeBtn.addEventListener('click', () => { if (confirm('Switch student? Progress lost.')) { currentStudent = null; quizSubmitted = false; selectedAnswers.fill(null); renderStudentView(); } });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // Toggle teacher dashboard visibility
    let teacherVisible = false;
    function toggleTeacherDashboard() {
        if (!teacherVisible) {
            teacherPanel.classList.add('visible');
            teacherVisible = true;
            renderTeacherDashboard();
        } else {
            teacherPanel.classList.remove('visible');
            teacherVisible = false;
        }
    }

    document.getElementById('teacherToggleLink').addEventListener('click', (e) => {
        e.preventDefault();
        toggleTeacherDashboard();
    });

    loadHistory();
    renderStudentView();
</script>
</body>
</html>
